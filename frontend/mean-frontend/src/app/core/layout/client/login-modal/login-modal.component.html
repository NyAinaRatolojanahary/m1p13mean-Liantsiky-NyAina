<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h3>{{ isLoginMode ? 'Connexion' : 'Inscription' }}</h3>
            <button class="close-btn" (click)="closeModal()"><i class="fa fa-times"></i></button>
        </div>

        <form (ngSubmit)="onSubmit()" #authForm="ngForm" class="login-form">
            <div class="form-group" *ngIf="!isLoginMode">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" [(ngModel)]="nom" required placeholder="Votre nom">
            </div>

            <div class="form-group" *ngIf="!isLoginMode">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" [(ngModel)]="prenom" required placeholder="Votre prénom">
            </div>

            <div class="form-group" *ngIf="!isLoginMode">
                <label for="dtn">Date de naissance</label>
                <input type="date" id="dtn" name="dtn" [(ngModel)]="dtn">
            </div>

            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="nom@example.com">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" [(ngModel)]="password" required
                    placeholder="**********">
            </div>

            <div class="error-msg" *ngIf="errorMessage">
                <i class="fa fa-exclamation-circle"></i> {{ errorMessage }}
            </div>

            <button type="submit" class="site-btn login-btn" [disabled]="!authForm.valid || isLoading">
                <span *ngIf="!isLoading">{{ isLoginMode ? 'SE CONNECTER' : "S'INSCRIRE" }}</span>
                <span *ngIf="isLoading">
                    <i class="fa fa-spinner fa-spin"></i> {{ isLoginMode ? 'Connexion...' : 'Inscription...' }}
                </span>
            </button>

            <div class="toggle-mode">
                <p>
                    {{ isLoginMode ? "Vous n'avez pas de compte ?" : "Vous avez déjà un compte ?" }}
                    <a href="javascript:void(0)" (click)="toggleMode()">
                        {{ isLoginMode ? "S'inscrire" : "Se connecter" }}
                    </a>
                </p>
            </div>
        </form>
    </div>
</div>
