<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h3>Connexion</h3>
            <button class="close-btn" (click)="closeModal()"><i class="fa fa-times"></i></button>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="nom@example.com">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" [(ngModel)]="password" required
                    placeholder="**********">
            </div>

            <div class="error-msg" *ngIf="errorMessage">
                <i class="fa fa-exclamation-circle"></i> {{ errorMessage }}
            </div>

            <button type="submit" class="site-btn login-btn" [disabled]="!loginForm.valid || isLoading">
                <span *ngIf="!isLoading">SE CONNECTER</span>
                <span *ngIf="isLoading"><i class="fa fa-spinner fa-spin"></i> Connexion...</span>
            </button>
        </form>
    </div>
</div>
