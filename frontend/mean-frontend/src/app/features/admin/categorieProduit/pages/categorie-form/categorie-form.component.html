<div class="container mt-4">
  <div class="col-xl-6">
    <div class="card stretch stretch-full">
      <div class="card-body">

        <h4 class="mb-4">Créer une catégorie</h4>

        <form [formGroup]="categorieForm" (ngSubmit)="submit()">

          <app-form-input
            label="Nom"
            placeholder="Nom de la catégorie"
            [required]="true"
            [control]="categorieForm.controls.nom">
          </app-form-input>

          <app-form-input
            label="Image"
            placeholder="Image"
            [required]="true"
            [control]="categorieForm.controls.image">
          </app-form-input>

          <button class="btn btn-primary">
            Enregistrer
          </button>

        </form>

      </div>
    </div>
  </div>
</div>
