<div class="container mt-4">
  <div class="col-xl-6">
    <div class="card stretch stretch-full">
      <div class="card-body">

        <h4 class="mb-4">Créer un mode de paiement</h4>

        <form [formGroup]="modePaiementForm" (ngSubmit)="submit()">

          <app-form-input
            label="Nom "
            placeholder="Nom du mode de paiement"
            [required]="true"
            [control]="modePaiementForm.controls.nom">
          </app-form-input>

          <button class="btn btn-primary">
            Enregistrer
          </button>

        </form>

      </div>
    </div>
  </div>
</div>
