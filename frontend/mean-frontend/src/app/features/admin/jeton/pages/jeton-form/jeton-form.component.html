<div class="container mt-4">
  <div class="col-xl-6">
    <div class="card stretch stretch-full">
      <div class="card-body">

        <h4 class="mb-4">Créer un jeton</h4>

        <form [formGroup]="jetonForm" (ngSubmit)="submit()">

          <app-form-input
            label="Nom"
            placeholder="Nom du jeton"
            [required]="true"
            [control]="jetonForm.controls.nom">
          </app-form-input>

          <app-form-input
            label="Valeur"
            placeholder="Valeur du jeton (AR)"
            [required]="true"
            [control]="jetonForm.controls.montant">
          </app-form-input>

          <button class="btn btn-primary">
            Enregistrer
          </button>

        </form>

      </div>
    </div>
  </div>
</div>
