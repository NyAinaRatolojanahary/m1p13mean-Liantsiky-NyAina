<div class="container mt-4">
  <div class="col-xl-6">
    <div class="card stretch stretch-full">
      <div class="card-body">

        <h4 class="mb-4">Allouer une box</h4>

        <form [formGroup]="contratForm" (ngSubmit)="submit()">

            <app-form-select
                label="Box"
                placeholder="Sélectionnez une box"
                [control]="contratForm.controls.boxId"
                [required]="true"
                [options]="boxes"
                [optionLabel]="'nom'"
                [optionValue]="'_id'">

            </app-form-select>

             <app-form-select
                label="Boutique"
                placeholder="Sélectionnez une boutique"
                [control]="contratForm.controls.boutiqueId"
                [required]="true"
                [options]="boutiques"
                [optionLabel]="'nom'"
                [optionValue]="'_id'">

            </app-form-select>

            <app-form-input
            label="Date debut"
            placeholder="Date debut du contrat"
            type="date"
            [required]="true"
            [control]="contratForm.controls.dateDebut">
            </app-form-input>

            <app-form-input
            label="Date fin"
            placeholder="Date fin du contrat"
            type="date"
            [required]="true"
            [control]="contratForm.controls.dateFin">
            </app-form-input>
         
          <button class="btn btn-primary">
            Enregistrer
          </button>

        </form>

      </div>
    </div>
  </div>
</div>
