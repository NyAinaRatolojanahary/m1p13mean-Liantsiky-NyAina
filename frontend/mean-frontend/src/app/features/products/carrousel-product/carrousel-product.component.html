<section class="latest-product spad">
  <div class="container">
    <h4>{{ title }}</h4>

    <div class="row products__slider owl-carousel">
      <div class="col-lg-3" *ngFor="let product of products">
        <app-product-card
          [id]="product._id"
          [name]="product.nom"
          [price]="product.prix"
          [discount]="product.remise"
          [image]="product.images">
        </app-product-card>
      </div>
    </div>

  </div>
</section>
