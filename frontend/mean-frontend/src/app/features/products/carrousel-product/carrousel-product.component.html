<section class="categories spad">
  <div class="container">
    <div class="section-title">
      <h2>{{ title }}</h2>
    </div>
    <div class="row">
      <div class="categories__slider init-product-carousel owl-carousel">
        <div class="col-lg-3" *ngFor="let product of products">
          <app-product-card [id]="product._id" [name]="product.nom" [prixActuel]="product.prixActuel"
            [discount]="product.remise" [image]="product.images">
          </app-product-card>
        </div>
      </div>
    </div>
  </div>
</section>
