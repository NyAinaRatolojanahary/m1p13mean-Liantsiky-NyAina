<section class="product-details spad" *ngIf="product">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 col-md-6">
                <div class="product__details__pic">
                    <div class="product__details__pic__item">
                        <img class="product__details__pic__item--large"
                            [src]="product.images || 'img/product/details/product-details-1.jpg'" alt="Image de Produits">
                    </div>
                </div>
            </div>
            <div class="col-lg-6 col-md-6">
                <div class="product__details__text">
                    <h3>{{ product.nom }}</h3>
                    <div class="product__details__price">{{ product.prix | number:'1.2-2' }} Ar</div>
                    <p>{{ product.details }}</p>
                    <div class="product__details__quantity">
                        <div class="quantity">
                            <div class="pro-qty">
                                <input type="number" [(ngModel)]="quantity" min="1">
                            </div>
                        </div>
                    </div>
                    <button (click)="addToCart()" class="primary-btn border-0">ADD TO CARD</button>
                    <ul>
                        <li><b>Availability</b> <span>In Stock</span></li>
                        <li><b>Shipping</b> <span>01 day shipping. <samp>Free pickup today</samp></span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>
