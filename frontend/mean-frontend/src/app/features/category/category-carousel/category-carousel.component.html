<section class="categories" style="padding-top: 30px; padding-bottom: 30px;">
    <div class="container">
        <div class="section-title">
            <h2>Nos categories</h2>
        </div>
        <div class="row">
            <div class="categories__slider owl-carousel">
                @for (category of categories; track category._id) {
                <div class="col-lg-3">
                    <div class="categories__item set-bg"
                        [style.background-image]="'url(' + (category.image || 'img/products/product-10.jpg') + ')'">
                        <h5><a [routerLink]="['/categories', category._id]">{{ category.nom }}</a></h5>
                    </div>
                </div>
                }
            </div>
        </div>
    </div>
</section>
