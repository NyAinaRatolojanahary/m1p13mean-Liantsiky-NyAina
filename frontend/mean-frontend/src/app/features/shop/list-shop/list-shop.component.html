<section class="featured spad">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="section-title">
                    <h2>{{ shopTitle }}</h2>
                </div>
            </div>
        </div>

        <!-- List of all boutiques when on /shops (no shopId) -->
        <div class="row" *ngIf="!isLoading && boutiques.length > 0">
            <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let boutique of boutiques">
                <div class="featured__item">
                    <div class="featured__item__pic set-bg"
                        style="background-image: url('assets/img/categories/cat-1.jpg')">
                        <ul class="featured__item__pic__hover">
                            <li><a [routerLink]="['/shops', boutique._id]"><i class="fa fa-eye"></i></a></li>
                        </ul>
                    </div>
                    <div class="featured__item__text">
                        <h6><a [routerLink]="['/shops', boutique._id]">{{ boutique.nom }}</a></h6>
                        <p>{{ boutique.description }}</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- List of products when on /shops/:id -->
        <div class="row featured__filter" *ngIf="!isLoading && products.length > 0; else noProducts">
            <app-product-card *ngFor="let product of products" class="col-lg-3 col-md-4 col-sm-6" [id]="product._id"
                [name]="product.nom" [prixActuel]="product.prixActuel" [discount]="product.remise"
                [image]="product.images">
            </app-product-card>
        </div>

        <ng-template #noProducts>
            <p *ngIf="!isLoading && boutiques.length === 0">Aucun produit dans cette boutique.</p>
        </ng-template>

        <div *ngIf="isLoading" class="text-center">
            <i class="fa fa-spinner fa-spin fa-2x"></i> Chargement...
        </div>
    </div>
</section>
